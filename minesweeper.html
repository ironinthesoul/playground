<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Minesweeper</title>
    <meta name="description" content="Minesweeper">
    <meta name="author" content="Michael">

    <script>
        const boardSize = 20;
        const fieldSize = 600;
        const difficulty = 15;
        let firstClick = true;


        class MineField {
            /**
             * Creates a minefield game state and initializes an empty board.
             * @param {number} fieldSize - Pixel size of the square SVG board.
             * @param {number} boardSize - Number of cells per row/column.
             * @param {number} difficulty - Mine density percentage.
             */
            constructor(fieldSize, boardSize, difficulty) {
                this.fieldSize = fieldSize;
                this.boardSize = boardSize;
                this.difficulty = difficulty;
                this.field = [];
                this.revealCell = this.revealCell.bind(this);
                this.placeFlag = this.placeFlag.bind(this);
                this.cascadedCells = new Set();
                this.mines = Math.floor(this.boardSize * this.boardSize * this.difficulty / 100);
                if (!this.mines) this.mines = 1;
                this.safeCells = 0;
                this.flagCount = 0;

                for (let y = 0; y < boardSize; y++) {
                    this.field[y] = [];
                    for (let x = 0; x < boardSize; x++) {
                        this.field[y][x] = 0;
                    }
                }
            }

            /**
             * Randomly places mines while keeping the first-click area safe.
             * @param {number|string} [ignoreX=0] - X position to keep safe.
             * @param {number|string} [ignoreY=0] - Y position to keep safe.
             * @returns {void}
             */
            placeMines(ignoreX=0, ignoreY=0) {

                const boardPositions = new Set();
                for (let y = 0; y < this.boardSize; y++) {
                    for (let x = 0; x < this.boardSize; x++) {
                        boardPositions.add(`${x},${y}`);
                    }
                }

                const adjacentCells = this.getAdjacentCells(ignoreX, ignoreY);
                for (const cell of adjacentCells) {
                    const { x, y } = cell;
                    boardPositions.delete(`${x},${y}`);
                }

                const availablePositions = Array.from(boardPositions);
                const shuffledPositions = this.shuffleCells(availablePositions);
                const minePlacements = shuffledPositions.slice(0, this.mines);

                for (const position of minePlacements) {
                    const [x, y] = position.split(",").map(Number);
                    this.field[y][x] = -1;
                } 
            }

            /**
             * Computes and stores numeric hints for all non-mine cells.
             * @returns {void}
             */
            placeHints() {
                for (let y = 0; y < this.boardSize; y++) {
                    for (let x = 0; x < this.boardSize; x++) {

                        if(this.field[y][x] === -1) {
                            continue;
                        }
                        this.field[y][x] = this.adjacentMineCounter(x, y);
                    }
                }
            }

            /**
             * Counts adjacent mines for a given cell coordinate.
             * @param {number|string} xPos - Cell X coordinate.
             * @param {number|string} yPos - Cell Y coordinate.
             * @returns {number} Number of adjacent mines.
             */
            adjacentMineCounter(xPos, yPos) {
                const adjacentCells = this.getAdjacentCells(xPos, yPos);
                let minecount = 0;

                for(const cell of adjacentCells) {
                    const { x: currentX, y: currentY } = cell;
                    if(this.field[currentY]?.[currentX] === -1) {
                        minecount++;
                    }
                }
                return minecount;
            }


            /**
             * Returns all valid neighbor coordinates around a cell.
             * @param {number|string} xPos - Cell X coordinate.
             * @param {number|string} yPos - Cell Y coordinate.
             * @returns {{x: number, y: number}[]} Adjacent cell coordinates.
             */
            getAdjacentCells(xPos, yPos) {
                let adjacentCells = [];

                for(let y = -1; y <= 1; y++) {
                    for(let x = -1; x <= 1; x++) {
                        const currentX = Number(xPos) + x;
                        const currentY = Number(yPos) + y;

                        if(
                            currentX >= 0 
                            && currentX < this.boardSize 
                            && currentY >= 0 
                            && currentY < this.boardSize
                        ) {
                            adjacentCells.push({ x: currentX, y: currentY });
                        }
                    }
                }
                return adjacentCells;
            }

            /**
             * Draws all SVG cell rectangles and wires mouse handlers.
             * @returns {void}
             */
            drawBoard() {
                for (let y = 0; y < this.boardSize; y++) {
                    for (let x = 0; x < this.boardSize; x++) {

                        const minefield = document.getElementById("mineFieldSVG");
                        minefield.setAttribute("width", this.fieldSize);
                        minefield.setAttribute("height", this.fieldSize);

                        const cellSize = this.fieldSize / this.boardSize;

                        const cell = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                        cell.setAttribute("x", x * cellSize);
                        cell.setAttribute("y", y * cellSize);
                        cell.setAttribute("width", cellSize);
                        cell.setAttribute("height", cellSize);
                        cell.setAttribute("class", "cell");

                        cell.dataset.fieldX = x;
                        cell.dataset.fieldY = y;

                        minefield.appendChild(cell);
                        cell.addEventListener("click", this.revealCell);
                        cell.addEventListener("contextmenu", this.placeFlag);

                    }
                }
            }

            /**
             * Handles left-click reveal behavior for a cell.
             * @param {MouseEvent} event - Click event from a cell rectangle.
             * @returns {void}
             */
            revealCell(event) {
                const cell = event.target;
                const x = cell.dataset.fieldX;
                const y = cell.dataset.fieldY;

                if (firstClick) {
                    this.placeMines(x, y);
                    this.placeHints();
                    firstClick = false;
                    // console.log(this.field);
                }
                
                if (cell.dataset.revealed == "true") return;

                const targetCellValue = this.field[y][x];

                switch(targetCellValue) {
                    case -1:
                        this.endGame("lose");
                        break;
                    case 0:
                        this.cascadedCells.clear();
                        this.cascadeCells(x, y);

                        break;
                    default:
                        this.showCellValue(x, y);
                }
            }

            /**
             * Handles right-click flag toggling for a cell.
             * @param {MouseEvent} event - Context menu event from a cell rectangle.
             * @returns {void}
             */
            placeFlag(event) {
                event.preventDefault();
                const cell = event.target;
                const x = cell.dataset.fieldX;
                const y = cell.dataset.fieldY;

                if (cell.dataset.flagged === "true") {
                    cell.dataset.flagged = "false";
                    cell.dataset.revealed = "false";
                    if (this.field[y][x] === -1) {
                        this.safeCells--;
                    }
                    this.flagCount--;
                    const textCell = document.querySelector(`text[data-field-x='${x}'][data-field-y='${y}']`);
                    if (textCell) {
                        textCell.remove();
                        const mineCount = document.getElementById("mineCount");
                        mineCount.textContent = this.flagCount;
                    }
                    return;
                }

                if (this.field[y][x] === -1) {
                    this.safeCells++;
                }
                this.flagCount++;
                const mineCount = document.getElementById("mineCount");
                mineCount.textContent = this.flagCount;

                cell.dataset.revealed = "true";
                cell.dataset.flagged = "true";
                this.showCellValue(x, y, true);

                if (this.safeCells === this.mines) {
                    this.endGame("win");
                }
            }

            /**
             * Reveals the full board and announces game result.
             * @param {"win"|"lose"} result - Final game state.
             * @returns {void}
             */
            endGame(result) {
                for (let y = 0; y < this.boardSize; y++) {
                    for (let x = 0; x < this.boardSize; x++) {    
                        const cell = document.querySelector(`rect[data-field-x='${x}'][data-field-y='${y}']`);
                        if (cell && cell.dataset.revealed !== "true") {
                            this.showCellValue(x, y);
                        }
                    }
                }
                if (result === "win") {
                    alert("Congratulations! You win!");
                } else {
                    alert(`Game Over! You lose!`);
                }
            }

            /**
             * Recursively reveals connected empty cells and their boundaries.
             * @param {number|string} xPos - Starting cell X coordinate.
             * @param {number|string} yPos - Starting cell Y coordinate.
             * @returns {void}
             */
            cascadeCells(xPos, yPos) {
                this.showCellValue(xPos, yPos);
                const adjacentCells = this.getAdjacentCells(xPos, yPos);

                for(const cell of adjacentCells) {
                    const { x, y } = cell;
                    const targetCellValue = this.field[y][x];

                    if(this.cascadedCells.has(`${x},${y}`)) {
                        continue;
                    }
                    this.cascadedCells.add(`${x},${y}`);

                    switch(targetCellValue) {
                        case 0:
                            this.cascadeCells(x, y);
                            break;
                        default:
                            this.showCellValue(x, y);
                    } 
                }
            }

            /**
             * Reveals a cell by writing its value (or a flag icon) into SVG text.
             * @param {number|string} xPos - Cell X coordinate.
             * @param {number|string} yPos - Cell Y coordinate.
             * @param {boolean} [isFlag=false] - Whether to render a flag icon.
             * @returns {void}
             */
            showCellValue(xPos, yPos, isFlag=false) {
                const cell = document.querySelector(`rect[data-field-x='${xPos}'][data-field-y='${yPos}']`);
                if (cell) {
                    const cellSize = this.fieldSize / this.boardSize;

                    const cellValue = this.field[yPos][xPos];
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", xPos * cellSize + (cellSize / 2));
                    text.setAttribute("y", yPos * cellSize + (cellSize / 2));
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("dominant-baseline", "middle");
                    text.setAttribute("font-size", cellSize / 2);
                    text.dataset.fieldX = xPos;
                    text.dataset.fieldY = yPos;

                    if (isFlag) {
                        text.textContent = "🚩";
                    } else {
                        switch(cellValue) {
                            case -1:
                                text.textContent = "💣";
                                break;
                            case 0:
                                text.textContent = "";
                                break;
                            default:
                                text.textContent = cellValue;
                        }
                    }
                    
                    cell.parentNode.appendChild(text);
                    cell.dataset.revealed = "true";
                }
            }

            /**
             * Returns a shuffled copy of an array using Fisher-Yates.
             * @param {string[]} arr - Array of board position keys.
             * @returns {string[]} New shuffled array.
             */
            shuffleCells(arr) {
                const shuffled = [...arr];
                // Fischer-Yates
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

        }

        document.addEventListener("DOMContentLoaded", () => {
            const mineField = new MineField(fieldSize, boardSize, difficulty);
            mineField.drawBoard();
            const totalMines = document.getElementById("totalMines");
            totalMines.textContent = mineField.mines;

        });



    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #mineFieldSVG {
            border: 1px solid black;
            margin-top: 20px;
        }
        rect.cell {
            stroke: black;
            stroke-width: 1px;
            cursor: pointer;
            fill: transparent;
        } 
        rect[data-revealed="true"] {
            fill: white;
            cursor: default;
        } 
        rect[data-flagged="true"] {
            cursor: pointer;
        } 
        text {
            pointer-events: none;
        }
    </style>
</head>
<body> 
    <h1>Minesweeper</h1>
    <svg id="mineFieldSVG" width="450" height="450">
        <defs> 
            <linearGradient id="boardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#07c700" />
                <stop offset="100%" stop-color="#d3fc03" />
            </linearGradient>
        </defs>
        <rect x="0" y="0" width="100%" height="100%" fill="url(#boardGradient)" />
    </svg>
    <h2>💣 <span id="mineCount">0</span>/<span id="totalMines">0</span></h2>
    <p>Left-click to reveal. Right-click to flag.</p>
</body>
</html>
